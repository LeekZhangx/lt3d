<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lt3D Viewer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 95%;
      max-width: 1400px;
      height: 96vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: #1e293b;
      border-radius: 12px;
      align-items: center;
    }

    .toolbar input[type="file"] {
      color: #e2e8f0;
    }

    .toolbar button {
      background: #3b82f6;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .toolbar button:hover {
      background: #2563eb;
    }

    .content {
      flex: 1;
      display: flex;
      gap: 12px;
      min-height: 0;
    }

    .editor {
      width: 35%;
      background: #020617;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .toolbar .icon-btn {
      background-color: lightgray;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #94a3b8;
      transition: 0.2s;
    }

    .toolbar .icon-btn.active {
      background-color: #ffffff;
    }

    .toolbar .icon-btn:hover {
      background-color: lightcyan;
    }

    textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      color: #e2e8f0;
      resize: none;
      outline: none;
      font-family: monospace;
      font-size: 13px;
    }

    .viewer {
      flex: 1;
      background: #020617;
      border-radius: 12px;
      overflow: hidden;
    }

    #lt-viewer {
      position: relative;
      overflow: visible !important;
      width: 100%;
      height: 100%;
    }

    .lil-gui {
      position: relative;
      top: -100%;
      left: calc(100% - 260px);
      width: 260px !important;
      z-index: 10 !important;
    }

    .select-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .select-group label {
      font-size: 12px;
      color: #94a3b8;
    }

    .hint-text {
      font-size: auto;
      color: #94a3b8;
      opacity: 0.9;
      white-space: nowrap;
    }
  </style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">



  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
      "three/examples/jsm/": "https://unpkg.com/three@0.182.0/examples/jsm/",
      "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
      "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.18/build/index.module.js",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.21/+esm"
    }
  }
  </script>
  <script type="module" crossorigin src="./lt3d.js"></script>
</head>

<body>
  <div class="app">

    <!-- 工具栏 -->
    <span class="hint-text" style="white-space: pre-line;">
      选择外部txt文件后请点击 Show 按钮。
      After selecting an external txt file, please click the Show button.
    </span>

    <div class="toolbar">

      <div class="select-group">
        <label for="versionSelect">Lt Version:</label>
        <select id="versionSelect">
          <option value="1.12">1.12</option>
          <option value="1.21">1.21</option>
        </select>
      </div>

      <div class="select-group">
        <label for="presetSelect">File:</label>
        <select id="presetSelect">
          <option value="">-- Select File --</option>
        </select>
      </div>

      <input type="file" id="fileInput" accept=".txt" />
      <button id="showBtn">Show</button>

      <!-- Scene -->
      <button id="sceneBtn" class="icon-btn" title="Scene GUI">
        <i class="bi bi-leaf" style="color: green;"></i>
      </button>

      <!-- Camera -->
      <button id="cameraBtn" class="icon-btn" title="Camera GUI">
        <i class="bi bi-camera-reels" style="color:deepskyblue;"></i>
      </button>

      <!-- Stats -->
      <button id="statsBtn" class="icon-btn" title="Stats GUI">
        <i class="bi bi-info-circle" style="color: purple;"></i>
      </button>

      <!-- Debug -->
      <button id="debugBtn" class="icon-btn" title="Debug GUI">
        <i class="bi bi-bug" style="color: orangered;"></i>
      </button>
    </div>

    <!-- 主内容 -->
    <div class="content">
      <div class="editor">
        <textarea id="textInput"></textarea>
      </div>

      <div class="viewer" id="viewer">
        <div id="lt-viewer"></div>
      </div>
    </div>

  </div>

</body>
</html>
